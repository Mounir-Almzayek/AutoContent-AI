# AutoContent AI: Backend (FastAPI) + Dashboard (Streamlit)
# Unique service/container/volume names to avoid conflicts with other deployments.
# Create .env from .env.example and set OPENROUTER_API_KEY (and optional WORDPRESS_*) before running.
# For production behind nginx: use two domains (one for API, one for dashboard). See nginx/autocontent-ai.conf.example.

services:
  autocontent_ai_backend:
    container_name: autocontent_ai_backend
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8870:8000"
    env_file: .env
    environment:
      - DATABASE_URL=sqlite:////data/content.db
    volumes:
      - autocontent_ai_backend_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  autocontent_ai_dashboard:
    container_name: autocontent_ai_dashboard
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "8871:8501"
    env_file: .env
    environment:
      # When behind nginx, set BACKEND_URL to your API domain (e.g. https://api.yourdomain.com)
      - BACKEND_URL=https://autocontent_ai_backend.system2030.com
    depends_on:
      autocontent_ai_backend:
        condition: service_healthy

volumes:
  autocontent_ai_backend_data:
